<section class="messages-view">
  <div class="messages-shell container">
    <div class="messages-header">
      <button type="button" class="messages-back" data-navigate="user/buyer/menu">
        <i class="bi bi-arrow-left"></i>
        Volver
      </button>
      <div>
        <span class="messages-chip">Mensajes</span>
        <h1>Tus conversaciones</h1>
      </div>
    </div>

    <div class="messages-list" id="conversationsList">
    </div>

    <div class="messages-empty" id="messagesEmpty" hidden>
      <i class="bi bi-chat-dots"></i>
      <p>No tienes conversaciones todavía.</p>
      <small>Cuando contactes a un vendedor, aparecerá aquí.</small>
    </div>
  </div>
</section>
