<section class="chat-view">
  <div class="chat-shell container">
    <div class="chat-header chat-header-professional">
      <button type="button" class="chat-back" data-navigate="messages/buyer">
        <i class="bi bi-arrow-left"></i>
        Volver
      </button>
      <div class="chat-vehicle-info">
        <img id="chatVehicleImage" src="https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?auto=format&fit=crop&w=100&q=80" alt="Auto" class="chat-vehicle-thumb" />
        <div>
          <h2 id="chatVehicleTitle">Toyota Corolla XEi 2021</h2>
          <span id="chatSellerName">Juan Pérez</span>
          <span class="chat-status"><i class="bi bi-circle-fill"></i> En línea</span>
        </div>
      </div>
      <div class="chat-actions">
        <button type="button" class="chat-action-btn" title="Ver detalles del auto">
          <i class="bi bi-car-front"></i>
        </button>
      </div>
    </div>

    <div class="chat-messages" id="chatMessages">
      <div class="message-date-divider">Hoy</div>
      
      <div class="message message-incoming">
        <div class="message-avatar">
          <img src="https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?auto=format&fit=crop&w=40&q=80" alt="Usuario" />
        </div>
        <div class="message-content">
          <div class="message-bubble">
            <p>Hola, me interesa el auto. ¿Está disponible para verlo?</p>
          </div>
          <span class="message-time">10:30</span>
          <span class="message-status"><i class="bi bi-check2"></i></span>
        </div>
      </div>

      <div class="message message-outgoing">
        <div class="message-content">
          <div class="message-bubble">
            <p>Sí, está disponible. ¿Cuándo podés pasar?</p>
          </div>
          <span class="message-time">10:32</span>
          <span class="message-status"><i class="bi bi-check2-all"></i></span>
        </div>
      </div>

      <div class="message message-incoming">
        <div class="message-avatar">
          <img src="https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?auto=format&fit=crop&w=40&q=80" alt="Usuario" />
        </div>
        <div class="message-content">
          <div class="message-bubble">
            <p>Puedo pasar mañana por la tarde.</p>
          </div>
          <span class="message-time">10:35</span>
        </div>
      </div>

      <div class="message message-outgoing">
        <div class="message-content">
          <div class="message-bubble">
            <p>Perfecto, te espero mañana a las 16hs.</p>
          </div>
          <span class="message-time">10:38</span>
        </div>
      </div>
    </div>

    <div class="chat-input-professional">
      <form class="chat-form" id="chatForm">
        <div class="chat-input-wrapper">
          <button type="button" class="chat-attach-btn" title="Adjuntar archivo">
            <i class="bi bi-paperclip"></i>
          </button>
          <input type="text" id="chatMessageInput" placeholder="Escribí tu mensaje..." autocomplete="off" />
          <button type="submit" class="chat-send-btn">
            <i class="bi bi-send-fill"></i>
          </button>
        </div>
      </form>
    </div>
  </div>
</section>
