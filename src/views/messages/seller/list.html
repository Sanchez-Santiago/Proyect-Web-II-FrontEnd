<section class="seller-messages-view">
  <div class="seller-messages-shell container">
    <div class="seller-messages-header">
      <div>
        <span class="seller-messages-chip">Mensajes</span>
        <h1>Conversaciones y Leads</h1>
      </div>
    </div>

    <div class="seller-messages-tabs">
      <button type="button" class="seller-tab active" data-tab="conversations">Conversaciones</button>
      <button type="button" class="seller-tab" data-tab="leads">Leads</button>
    </div>

    <div class="seller-conversations-list" id="conversationsList">
    </div>

    <div class="seller-leads-list" id="leadsList" hidden>
    </div>

    <div class="seller-messages-empty" id="messagesEmpty" hidden>
      <i class="bi bi-chat-dots"></i>
      <p>No tienes mensajes todavía.</p>
      <small>Cuando un comprador te contacte, aparecerá aquí.</small>
    </div>
  </div>
</section>
