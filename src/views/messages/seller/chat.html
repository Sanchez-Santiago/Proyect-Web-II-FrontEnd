<section class="seller-chat-view">
  <div class="seller-chat-shell container">
    <div class="seller-chat-header">
      <button type="button" class="seller-chat-back" data-navigate="messages/seller">
        <i class="bi bi-arrow-left"></i>
        Volver
      </button>
      <div class="seller-chat-info">
        <img id="chatVehicleImage" src="https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?auto=format&fit=crop&w=100&q=80" alt="Auto" class="seller-chat-vehicle-thumb" />
        <div>
          <h2 id="chatVehicleTitle">Toyota Corolla XEi 2021</h2>
          <span id="chatBuyerName">Carlos López</span>
          <span class="seller-chat-status"><i class="bi bi-circle-fill"></i> En línea</span>
        </div>
      </div>
    </div>

    <div class="seller-chat-messages" id="chatMessages">
    </div>

    <div class="seller-chat-input">
      <form class="seller-chat-form" id="chatForm">
        <div class="seller-chat-input-wrapper">
          <button type="button" class="seller-chat-attach" title="Adjuntar">
            <i class="bi bi-paperclip"></i>
          </button>
          <input type="text" id="chatMessageInput" placeholder="Escribí tu mensaje..." autocomplete="off" />
          <button type="submit" class="seller-chat-send">
            <i class="bi bi-send-fill"></i>
          </button>
        </div>
      </form>
    </div>
  </div>
</section>
