<section class="favorites-view">
  <div class="favorites-shell container">
    <div class="favorites-header">
      <button type="button" class="favorites-back" onclick="window.history.back()">
        <i class="bi bi-arrow-left"></i>
        Volver
      </button>
      <div>
        <span class="favorites-chip">Favoritos</span>
        <h1>Autos guardados</h1>
      </div>
    </div>

    <div class="favorites-grid" id="favoritesGrid">
    </div>

    <div class="favorites-empty" id="favoritesEmpty" hidden>
      <i class="bi bi-heart"></i>
      <p>No tienes favoritos todavía.</p>
      <small>Guarda los autos que te interesen haciendo click en el corazón.</small>
    </div>
  </div>
</section>
