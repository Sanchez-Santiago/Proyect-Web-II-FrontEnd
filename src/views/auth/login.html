<section class="login-view">
  <div class="login-shell container">
    <div class="row g-4 align-items-center">
      <div class="col-lg-6">
        <div class="login-copy">
          <h1>Entrar es el primer paso para encontrar ese usado que se siente como nuevo.</h1>
        </div>
      </div>

      <div class="col-lg-6">
        <article class="login-card">
          <div class="login-card-top">
            <span class="login-chip">Login</span>
            <span class="login-status">Compra y venta</span>
          </div>

          <h2>Iniciar sesion</h2>
          <p class="login-card-text">Ingresa tu email para seguir tu movimiento en el mercado.</p>

          <form id="loginForm" class="login-form" novalidate>
            <label for="loginEmail" class="form-label">Correo electronico</label>
            <div class="input-wrap">
              <i class="bi bi-envelope-fill"></i>
              <input
                id="loginEmail"
                name="email"
                type="email"
                class="form-control form-control-lg"
                placeholder="nombre@correo.com"
                autocomplete="email"
                required
              />
            </div>

            <label for="loginPassword" class="form-label">Contrasena</label>
            <div class="input-wrap">
              <i class="bi bi-lock-fill"></i>
              <input
                id="loginPassword"
                name="password"
                type="password"
                class="form-control form-control-lg"
                placeholder="Tu contrasena"
                autocomplete="current-password"
                required
              />
            </div>

            <small id="loginMessage" class="login-message">Ingresa tu email y contrasena.</small>

            <button type="submit" class="btn login-submit w-100">Iniciar sesion</button>

            <p class="login-footer">
              No tenes cuenta? <a href="#auth/register" data-navigate="auth/register">Crear cuenta</a>
            </p>
          </form>
        </article>
      </div>
    </div>
  </div>
</section>
