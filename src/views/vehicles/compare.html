<div class="compare-page">
  <header class="compare-header">
    <div class="compare-header-content">
      <button type="button" class="compare-back" onclick="window.history.back()">
        <i class="bi bi-arrow-left"></i> Volver
      </button>
      <h1>Comparar vehículos</h1>
      <button type="button" class="compare-clear-btn" id="compareClearBtn">
        <i class="bi bi-trash"></i> Limpiar
      </button>
    </div>
  </header>

  <section class="compare-body">
    <div id="compareEmpty" class="compare-empty">
      <i class="bi bi-arrow-left-right"></i>
      <h2>Sin vehículos para comparar</h2>
      <p>Andá al <a href="#home" data-navigate="home">inicio</a> y usá el botón <i class="bi bi-arrow-left-right"></i> en las tarjetas para agregar vehículos a la comparación.</p>
    </div>
    <div id="compareTableContainer" class="compare-table-container" style="display:none;">
      <div class="compare-scroll">
        <table class="compare-table" id="compareTable">
          <thead>
            <tr id="compareHeaderRow">
              <th class="compare-label-cell">Característica</th>
            </tr>
          </thead>
          <tbody id="compareBody">
          </tbody>
        </table>
      </div>
    </div>
  </section>
</div>
