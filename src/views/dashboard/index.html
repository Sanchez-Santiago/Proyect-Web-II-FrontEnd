<div class="dashboard-page animate-reveal">
  <div class="dashboard-layout">
    <!-- Sidebar dynamically injected -->
    <aside class="dashboard-sidebar glass" id="dashboardSidebar">
    </aside>
    
    <main class="dashboard-main">
      <header class="dashboard-topbar">
        <div class="dashboard-top-info">
          <nav class="dashboard-switch glass" id="dashboardSwitch" aria-label="Cambiar modo">
            <!-- Switches dynamically injected -->
          </nav>
          <div id="dashboardKickerContainer">
            <span class="dashboard-kicker" id="dashboardKicker">Consola</span>
            <h1 id="dashboardTitle">Cargando...</h1>
          </div>
        </div>
        <div class="dashboard-top-actions" id="dashboardTopActions">
          <!-- Actions dynamically injected -->
        </div>
      </header>
      
      <!-- Content Area dynamically injected -->
      <div id="dashboardContent" class="dashboard-content">
        <div class="loading-container">
          <div class="loading-spinner"></div>
          <p>Preparando tu espacio...</p>
        </div>
      </div>
    </main>
  </div>
</div>
